<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voting Eligibility Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background: linear-gradient(135deg,#1e3c72,#2a5298,#6dd5fa);
    background-size:400% 400%;
    animation: gradient 12s ease infinite;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes gradient{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

    width:420px;
    padding:35px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);

    border-radius:20px;

    box-shadow:0 10px 35px rgba(0,0,0,.3);

    color:white;
}

h1{

    text-align:center;
    margin-bottom:25px;
}

input{

    width:100%;
    padding:12px;
    margin:12px 0;

    border:none;
    border-radius:8px;

    outline:none;
}

button{

    width:100%;
    padding:14px;

    border:none;
    border-radius:8px;

    background:#00c853;
    color:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    background:#009624;
    transform:scale(1.02);

}

.result{

    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.footer{

    margin-top:20px;
    text-align:center;
    opacity:.8;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>🗳 Voting Eligibility Checker</h1>

<form method="POST">

<input
type="text"
name="name"
placeholder="Enter Name"
required>

<input
type="number"
name="age"
placeholder="Enter Age"
required>

<input
type="text"
name="nationality"
placeholder="Nationality"
required>

<button type="submit">

Check Eligibility

</button>

</form>

<div class="result">

{{ result }}

</div>

<div class="footer">

🚀 Powered by Flask + Docker + GitHub Actions

</div>

</div>

</body>
</html>
